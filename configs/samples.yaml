# ─── Plotting groups (stacks) ──────────────────────────────────────────────────
# Each stack references samples by name from the `samples` section above.
# The same sample can appear in multiple stacks.
# extra_cuts on a stack replicates CutPerStackDict (applied to all samples in the stack).
# is_signal: true → treated as signal overlay rather than background stack entry.
stacks:

  SM Signals:
    legend: "SM Signals"
    color: [255, 0, 0]
    is_signal: true
    signal_multiplier: 100
    samples: [bbWW_SM_new, bbtt_SM_new, bbZZ_SM_new]

  bb4l:
    legend: "#it{bb4l}"
    color: [93, 175, 188]
    is_signal: true
    signal_multiplier: 1
