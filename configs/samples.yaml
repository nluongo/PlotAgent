# configs/samples.yaml
# Authoritative source for all physics samples and plotting groups.
# Replaces: SampleDict_run2/3(), SignalDict(), CutPerSampleDict(), CutPerStackDict()
#           from histoDict.py, and sample_map_run2/3, campaign_map_run2/3,
#           data_campaign_map_run2 from PlottingList.py.
#
# Two-section design:
#   samples: individual physics samples defined once, with per-run dataset_id and campaigns.
#            The same sample can be referenced by multiple stacks.
#   stacks:  named plotting groups that reference sample names. A stack defines what
#            appears as one entry in the legend/histogram stack. Multiple stacks can
#            reference the same sample (e.g., bbWW_251 in "HH (251 GeV)" and in "HH bbWW").

# ─── Individual physics samples ────────────────────────────────────────────────
# Per-sample extra_cuts replaces CutPerSampleDict in histoDict.py.
