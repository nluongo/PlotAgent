# configs/plots.yaml
# Authoritative definitions for all 1D histogram variables.
# Replaces: PlottingDict() from histoDict.py and customHists in config.yaml.
#
# Each key under `variables` is the branch name in the ntuple (or a $var$-resolved alias).
# Any field not specified inherits from `defaults`.

defaults:
  toGeV: true
  units: ""
  nBins: 30
  x-min: 0
  x-max: 1000

variables:

  bbll_mll_NOSYS:
    x-axis title: "#it{m}_{ll} [GeV]"
    units: "GeV"
    x-min: 0
    x-max: 1000
    nBins: 50
    toGeV: true

  bbll_HT2_NOSYS:
    x-axis title: "#it{HT2} [GeV]"
    units: "GeV"
    x-min: 0
    x-max: 800
    nBins: 80
    toGeV: true

  bbll_nJets_NOSYS:
    x-axis title: "#it{nJet}"
    units: ""
    x-min: 0
    x-max: 10
    nBins: 10
    toGeV: false

  bbll_PNN_Score_X251_NOSYS:
    x-axis title: "PNN SR1 251 GeV"
    units: ""
    x-min: 0
    x-max: 1
    nBins: 10
    toGeV: false

  bbll_PNN_Score_X1000_NOSYS:
    x-axis title: "PNN SR1 1000 GeV"
    units: ""
    x-min: 0
    x-max: 1
    nBins: 10
    toGeV: false

  bbll_mbb_NOSYS:
    x-axis title: "#it{m_{bb}} [GeV]"
    units: "GeV"
    x-min: 0
    x-max: 500
    nBins: 20
    toGeV: true

  bbll_pTll_NOSYS:
    x-axis title: "#it{pT}_{ll} [GeV]"
    units: "GeV"
